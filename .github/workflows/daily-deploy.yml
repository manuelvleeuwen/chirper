name: Daily Deploy

on:
  schedule:
    # 03:00 UTC every day (adjust as needed)
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Laravel Cloud deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}"
